<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="description" content="Ricettario di Panificazione — Pane, Lievitati, Pizza, Focaccia">
<title>Panificazione · Ricettario</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Cormorant+SC:wght@300;400&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{-webkit-text-size-adjust:100%;text-size-adjust:100%;scroll-behavior:smooth}

:root{
  /* ── Palette Panificazione Artigianale ── */

  /* Inchiostro – toni profondi della crosta scura */
  --ink:#1A1410;--ink2:#2A2018;--ink3:#3B2E22;

  /* Ambra – il colore del miele e della crosta dorata */
  --gold:#8B5E1A;--gold2:#A8722A;--gold3:#C4893A;
  --gold-glow:rgba(139,94,26,.11);--gold-rim:rgba(139,94,26,.20);

  /* Terra cotta – argilla del forno a legna */
  --terra:#8C4A2F;--terra-bg:rgba(140,74,47,.08);--terra-border:rgba(140,74,47,.20);

  /* Farina – bianchi e panna naturali, non abbaglianti */
  --cream:#F5F0E6;--cream2:#EDE5D4;--cream3:#E0D5C0;--cream4:#CFC3A8;

  /* Cenere – grigi caldi della semola */
  --smoke:#6E6050;--smoke2:#9A8A78;--smoke3:#C2B49E;

  --white:#FAF6EE;
  --card-bg:#FDFAF3;

  /* Controlli – lino grezzo */
  --ctrl-bg:#EAE0CB;--ctrl-border:rgba(139,94,26,.22);

  --shadow-xs:0 1px 3px rgba(26,20,16,.07);
  --shadow-sm:0 2px 8px rgba(26,20,16,.09);
  --shadow-md:0 6px 22px rgba(26,20,16,.11);
  --shadow-lg:0 14px 40px rgba(26,20,16,.15);
  --r:4px;
  --font-display:'Cormorant Garamond',Georgia,serif;
  --font-sc:'Cormorant SC','Cormorant Garamond',Georgia,serif;
  --font-sans:-apple-system,BlinkMacSystemFont,'SF Pro Text','Helvetica Neue',sans-serif;
}

[data-dark]{
  /* Notte del forno – braci e carbone */
  --ink:#EDE5D0;--ink2:#D0C4AC;--ink3:#AFA092;
  --cream:#140F0A;--cream2:#1C1610;--cream3:#261E16;--cream4:#2E251A;
  --smoke:#6A5C4C;--smoke2:#443A2C;--smoke3:#2C2418;
  --white:#1C1610;--card-bg:#1C1610;
  --ctrl-bg:#140F0A;--ctrl-border:rgba(139,94,26,.22);
  --shadow-xs:0 1px 3px rgba(0,0,0,.30);
  --shadow-sm:0 2px 8px rgba(0,0,0,.36);
  --shadow-md:0 6px 22px rgba(0,0,0,.48);
  --shadow-lg:0 14px 40px rgba(0,0,0,.60);
}

/* ─── Grain texture overlay ─── */
body::before{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:999;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");
  opacity:.025;mix-blend-mode:multiply;
}
[data-dark] body::before{mix-blend-mode:screen;opacity:.04}

body{
  background:var(--cream);
  color:var(--ink);
  font-family:var(--font-display);
  min-height:100vh;
  -webkit-font-smoothing:antialiased;
  -moz-osx-font-smoothing:grayscale;
  padding-bottom:env(safe-area-inset-bottom);
}

/* ─── HEADER ─── */
.hd{
  text-align:center;
  padding:clamp(2rem,6vw,3.5rem) 1.4rem 0;
  background:linear-gradient(180deg,var(--cream) 0%,var(--cream2) 100%);
  border-bottom:1px solid var(--ctrl-border);
  position:relative;overflow:hidden;
}
/* subtle top border stripes */
.hd::before{
  content:'';position:absolute;top:0;left:0;right:0;height:3px;
  background:linear-gradient(90deg,transparent,var(--gold),var(--gold3),var(--gold),transparent);
}

.hd-corner{position:absolute;top:1.2rem;right:1.2rem;z-index:2}
.theme-btn{
  background:var(--ctrl-bg);border:1px solid var(--ctrl-border);
  border-radius:20px;padding:.3rem .7rem;cursor:pointer;
  font-family:var(--font-sans);font-size:.6rem;letter-spacing:.1em;
  color:var(--smoke2);display:inline-flex;align-items:center;gap:.3rem;
  -webkit-tap-highlight-color:transparent;transition:background .2s,color .2s;
}
.theme-btn:hover{background:var(--gold-glow)}

/* wheat icon */
.hd-icon{
  margin:0 auto .8rem;
  width:clamp(64px,14vw,96px);height:clamp(64px,14vw,96px);
  border-radius:50%;
  background:var(--white);
  border:1.5px solid var(--gold2);
  box-shadow:0 0 0 4px var(--gold-glow),var(--shadow-md);
  display:flex;align-items:center;justify-content:center;
}
.hd-icon svg{width:52%;height:52%}

.eyebrow{
  font-family:var(--font-sans);
  font-size:.56rem;letter-spacing:.36em;text-transform:uppercase;
  color:var(--gold2);
  display:flex;align-items:center;justify-content:center;gap:.6rem;
  margin-bottom:.4rem;
}
.eyebrow::before,.eyebrow::after{
  content:'';width:28px;height:1px;
  background:linear-gradient(90deg,transparent,var(--gold2));
}
.eyebrow::after{background:linear-gradient(270deg,transparent,var(--gold2))}

.hd-title{
  font-family:var(--font-sc);
  font-size:clamp(2.4rem,9vw,4.2rem);
  font-weight:300;letter-spacing:.1em;
  color:var(--ink);line-height:1;
  margin:.3rem 0 .2rem;
}
.hd-title em{
  font-style:italic;font-family:var(--font-display);
  color:var(--gold2);letter-spacing:.06em;
}

.hd-author{
  font-family:var(--font-display);
  font-size:clamp(.9rem,3vw,1.15rem);
  font-weight:300;font-style:italic;
  color:var(--smoke2);margin:.35rem 0 0;letter-spacing:.04em;
}
.hd-sub{
  font-family:var(--font-sans);
  font-size:.56rem;letter-spacing:.2em;
  color:var(--smoke3);margin:.6rem 0 0;text-transform:uppercase;
}
.hd-rule{
  display:flex;align-items:center;gap:.55rem;
  margin:1.1rem 0 0;opacity:.5;
}
.hd-rule::before,.hd-rule::after{
  content:'';flex:1;height:1px;
  background:linear-gradient(90deg,transparent,var(--gold));
}
.hd-rule::after{background:linear-gradient(270deg,transparent,var(--gold))}
.hd-rule span{color:var(--gold);font-size:.44rem;letter-spacing:.3em}

/* ─── STICKY CONTROLS ─── */
.ctrl-shell{
  position:-webkit-sticky;position:sticky;top:0;z-index:40;
  background:var(--cream2);
  border-bottom:1px solid var(--ctrl-border);
  box-shadow:0 2px 14px rgba(28,23,18,.08);
  backdrop-filter:blur(8px);
  -webkit-backdrop-filter:blur(8px);
}
.ctrl-row{
  max-width:1360px;margin:0 auto;
  padding:.7rem 1.2rem;
  display:flex;gap:.65rem;align-items:center;flex-wrap:nowrap;
}
.search-wrap{flex:1;min-width:0;position:relative}
.search-ico{
  position:absolute;left:.78rem;top:50%;transform:translateY(-50%);
  color:var(--gold);pointer-events:none;width:14px;height:14px;
}
.search-inp{
  width:100%;background:var(--white);
  border:1.5px solid var(--ctrl-border);border-radius:var(--r);
  padding:.55rem .8rem .55rem 2.3rem;
  font-family:var(--font-display);font-size:.95rem;
  color:var(--ink);outline:none;
  -webkit-appearance:none;appearance:none;-webkit-border-radius:var(--r);
  transition:border-color .18s,box-shadow .18s;
}
.search-inp::placeholder{color:var(--smoke3);font-style:italic}
.search-inp:focus{border-color:var(--gold2);box-shadow:0 0 0 3px var(--gold-glow)}

.dose-box{
  display:flex;align-items:stretch;
  border:1.5px solid var(--ctrl-border);border-radius:var(--r);
  background:var(--white);overflow:hidden;flex-shrink:0;
}
.dose-lbl{
  padding:0 .58rem;font-family:var(--font-sans);
  font-size:.5rem;letter-spacing:.18em;text-transform:uppercase;
  color:var(--gold);border-right:1px solid var(--ctrl-border);
  display:flex;align-items:center;white-space:nowrap;background:var(--ctrl-bg);
}
.dose-btn{
  background:none;border:none;color:var(--smoke2);
  width:32px;min-height:36px;cursor:pointer;font-size:1rem;
  display:flex;align-items:center;justify-content:center;
  -webkit-tap-highlight-color:transparent;transition:background .15s,color .15s;
}
.dose-btn:active{background:var(--gold2);color:#fff}
.dose-val{
  background:none;border:none;color:var(--ink);
  font-family:var(--font-display);font-size:1rem;
  width:2.8rem;text-align:center;outline:none;
  border-left:1px solid var(--ctrl-border);border-right:1px solid var(--ctrl-border);
}
.dose-val::-webkit-inner-spin-button,.dose-val::-webkit-outer-spin-button{-webkit-appearance:none}

.view-btns{
  display:flex;border:1.5px solid var(--ctrl-border);
  border-radius:var(--r);overflow:hidden;flex-shrink:0;
}
.vbtn{
  background:var(--white);border:none;padding:.45rem .58rem;
  cursor:pointer;color:var(--smoke2);display:flex;align-items:center;
  -webkit-tap-highlight-color:transparent;transition:background .15s,color .15s;
}
.vbtn+.vbtn{border-left:1px solid var(--ctrl-border)}
.vbtn.on{background:var(--gold2);color:#fff}

.cat-bar{
  max-width:1360px;margin:0 auto;padding:.45rem 1.2rem;
  display:flex;gap:.35rem;flex-wrap:nowrap;
  overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;
}
.cat-bar::-webkit-scrollbar{display:none}
.cpill{
  background:var(--white);border:1px solid var(--ctrl-border);
  border-radius:20px;padding:.26rem .76rem;
  font-family:var(--font-sans);font-size:.66rem;letter-spacing:.08em;
  color:var(--smoke);cursor:pointer;white-space:nowrap;
  -webkit-tap-highlight-color:transparent;-webkit-user-select:none;user-select:none;
  transition:background .15s,color .15s,border-color .15s;
}
.cpill.on{background:var(--gold2);border-color:var(--gold2);color:#fff}

/* ─── GRID ─── */
.count-bar{
  max-width:1360px;margin:0 auto;
  padding:.4rem 1.3rem 0;text-align:right;
  font-family:var(--font-sans);font-size:.58rem;
  letter-spacing:.1em;text-transform:uppercase;color:var(--smoke3);
}
.grid{
  max-width:1360px;margin:0 auto;
  padding:1.6rem 1.2rem 6rem;
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(308px,1fr));
  gap:1.5rem;
  align-items:start;
}
.grid.list{grid-template-columns:1fr}

/* ─── CARD ─── */
.card{
  background:var(--card-bg);
  border:1px solid var(--ctrl-border);
  border-radius:6px;
  overflow:hidden;
  display:flex;flex-direction:column;
  box-shadow:var(--shadow-sm);
  transition:box-shadow .25s,transform .25s;
  animation:fadeUp .4s ease both;
}
.card:hover{box-shadow:var(--shadow-md);transform:translateY(-2px)}
@keyframes fadeUp{
  from{opacity:0;transform:translateY(10px)}
  to{opacity:1;transform:translateY(0)}
}
.card:nth-child(1){animation-delay:.04s}
.card:nth-child(2){animation-delay:.08s}
.card:nth-child(3){animation-delay:.12s}
.card:nth-child(4){animation-delay:.16s}
.card:nth-child(5){animation-delay:.20s}
.card:nth-child(6){animation-delay:.24s}
.card:nth-child(7){animation-delay:.28s}
.card:nth-child(8){animation-delay:.32s}
.card:nth-child(9){animation-delay:.36s}
.card:nth-child(10){animation-delay:.40s}
.card:nth-child(11){animation-delay:.44s}
.card:nth-child(12){animation-delay:.48s}

/* gold top stripe */
.card-stripe{
  height:2.5px;
  background:linear-gradient(90deg,var(--gold),var(--gold3),var(--gold),var(--gold3),var(--gold));
  flex-shrink:0;
}

/* card header */
.card-hd{
  background:var(--ink3);
  padding:.9rem 1.1rem .8rem;
  border-bottom:1px solid var(--gold);
  position:relative;
}
.card-meta{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:.28rem;
}
.card-num{
  font-family:var(--font-sans);font-size:.48rem;
  letter-spacing:.3em;text-transform:uppercase;color:rgba(139,94,26,.7);
}
.card-cat{
  font-family:var(--font-sans);font-size:.5rem;
  letter-spacing:.14em;text-transform:uppercase;
  color:rgba(139,94,26,.55);
  border:1px solid rgba(139,94,26,.25);
  border-radius:2px;padding:.1rem .45rem;
}
.card-name{
  font-family:var(--font-display);
  font-size:1.05rem;font-weight:400;font-style:italic;
  color:#F0E8D6;letter-spacing:.01em;line-height:1.3;
}
.card-name-star{color:var(--gold2)}
/* subtle line under name */
.card-hd::after{
  content:'';position:absolute;bottom:0;left:1.1rem;right:1.1rem;height:1px;
  background:linear-gradient(90deg,var(--gold),transparent);
  opacity:.4;
}

/* ─── INGREDIENTS TABLE ─── */
.tbl{width:100%;border-collapse:collapse}
.tbl thead tr{background:var(--cream3)}
.tbl thead th{
  font-family:var(--font-sans);font-size:.48rem;
  letter-spacing:.16em;text-transform:uppercase;font-weight:500;
  color:var(--smoke);padding:.42rem .85rem;
  text-align:left;border-bottom:1px solid var(--ctrl-border);
}
.tbl thead th.r{text-align:right}
.tbl thead th.sc{
  text-align:right;color:var(--gold2);
  background:rgba(139,94,26,.07);
  border-left:1px solid rgba(139,94,26,.16);
}
.tbl tbody tr{border-bottom:1px solid rgba(139,94,26,.07)}
.tbl tbody tr:last-child{border-bottom:none}
.tbl tbody tr:nth-child(even){background:rgba(139,94,26,.025)}
.tbl td{padding:.38rem .85rem;vertical-align:middle}
.td-n{font-family:var(--font-display);font-size:.88rem;color:var(--ink)}
.td-b{font-family:var(--font-display);font-size:.82rem;text-align:right;color:var(--smoke2)}
.td-u{font-family:var(--font-sans);font-size:.62rem;color:var(--smoke3);padding-left:.15rem;font-style:italic}
.td-s{
  font-family:var(--font-display);font-size:.9rem;font-style:italic;
  text-align:right;color:var(--gold2);
  background:rgba(139,94,26,.05);
  border-left:1px solid rgba(139,94,26,.12);
  padding-right:.9rem;
}
/* section divider row */
.tr-sec td{
  font-family:var(--font-sans);font-size:.5rem;
  letter-spacing:.2em;text-transform:uppercase;
  color:var(--terra);background:var(--terra-bg);
  padding:.28rem .85rem;
  border-top:1px solid var(--terra-border);
  font-weight:600;
}

/* ─── SECTION LABEL ─── */
.sec-label{
  font-family:var(--font-sans);
  font-size:.48rem;letter-spacing:.22em;text-transform:uppercase;
  color:var(--gold);margin-bottom:.42rem;
  display:flex;align-items:center;gap:.42rem;
}
.sec-label::after{
  content:'';flex:1;height:1px;
  background:linear-gradient(90deg,rgba(139,94,26,.28),transparent);
}

/* ─── PROCESSO ─── */
.proc-sec{
  padding:.7rem 1.1rem .6rem;
  border-top:1px solid var(--ctrl-border);
}
.proc-list{list-style:none;display:flex;flex-direction:column;gap:.25rem}
.proc-item{
  display:flex;align-items:baseline;gap:.5rem;
  font-family:var(--font-display);font-size:.82rem;
  color:var(--ink2);line-height:1.45;
}
.proc-n{
  font-family:var(--font-sans);font-size:.46rem;font-weight:700;
  color:var(--gold2);min-width:1rem;flex-shrink:0;margin-top:.06rem;
  letter-spacing:.05em;
}

/* ─── COTTURA ─── */
.cott-sec{
  padding:.6rem 1.1rem .65rem;
  border-top:1px solid var(--ctrl-border);
}
.cott-list{display:flex;flex-direction:column;gap:.28rem;margin-top:.38rem}
.cott-chip{
  display:flex;align-items:center;gap:.5rem;
  background:rgba(139,94,26,.06);
  border:1px solid rgba(139,94,26,.18);
  border-radius:3px;
  padding:.3rem .7rem;
  font-family:var(--font-sans);font-size:.7rem;
  color:var(--gold2);letter-spacing:.02em;
}
.cott-arrow{
  width:10px;height:10px;flex-shrink:0;opacity:.7;
  color:var(--gold3);
}

/* ─── TARGET/PRODUZIONE ─── */
.target-bar{
  padding:.38rem 1.1rem;
  border-top:1px solid var(--ctrl-border);
  background:rgba(139,94,26,.04);
  font-family:var(--font-sans);font-size:.64rem;
  letter-spacing:.06em;color:var(--smoke2);
  display:flex;align-items:center;gap:.42rem;
  line-height:1.4;
}
.target-dot{
  width:5px;height:5px;border-radius:50%;
  background:var(--gold2);flex-shrink:0;
}

/* ─── EMPTY STATE ─── */
.empty{
  grid-column:1/-1;text-align:center;
  padding:5rem 2rem;color:var(--smoke2);
}
.empty-ico{
  font-size:2.2rem;opacity:.2;margin-bottom:.8rem;
  font-family:var(--font-display);
}
.empty p{font-family:var(--font-sans);font-size:.88rem;font-style:italic}

/* ─── FAB ─── */
.fab{
  position:fixed;
  bottom:calc(1.6rem + env(safe-area-inset-bottom));
  right:1.6rem;
  width:50px;height:50px;border-radius:50%;
  background:linear-gradient(135deg,var(--gold),var(--gold2));
  border:none;cursor:pointer;
  font-size:1.45rem;color:#fff;z-index:60;
  box-shadow:0 4px 20px rgba(139,94,26,.42);
  display:flex;align-items:center;justify-content:center;
  -webkit-tap-highlight-color:transparent;
  transition:transform .15s,box-shadow .15s;
}
.fab:active{transform:scale(.92);box-shadow:0 2px 10px rgba(139,94,26,.3)}

/* ─── MODAL ─── */
.modal-bg{
  display:none;position:fixed;inset:0;
  background:rgba(8,6,3,.78);
  -webkit-backdrop-filter:blur(5px);backdrop-filter:blur(5px);
  z-index:80;align-items:flex-end;justify-content:center;
}
.modal-bg.open{display:flex}
.modal{
  background:var(--card-bg);
  border-radius:14px 14px 0 0;
  padding:1.3rem 1.4rem calc(1.8rem + env(safe-area-inset-bottom));
  width:100%;max-width:580px;
  max-height:90vh;overflow-y:auto;
  -webkit-overflow-scrolling:touch;
}
.modal-handle{
  width:34px;height:3px;border-radius:2px;
  background:var(--smoke3);margin:0 auto 1.1rem;
}
.modal h3{
  font-family:var(--font-display);
  color:var(--gold2);font-size:1.2rem;font-weight:400;
  font-style:italic;margin-bottom:1rem;
}
.modal label{
  display:block;font-family:var(--font-sans);
  font-size:.62rem;letter-spacing:.12em;text-transform:uppercase;
  color:var(--smoke);margin:.85rem 0 .26rem;
}
.modal input,.modal select{
  width:100%;background:var(--ctrl-bg);
  border:1px solid var(--ctrl-border);border-radius:var(--r);
  color:var(--ink);padding:.5rem .72rem;
  font-size:.9rem;font-family:var(--font-display);
  -webkit-appearance:none;appearance:none;outline:none;
  -webkit-border-radius:var(--r);
  transition:border-color .18s;
}
.modal input:focus,.modal select:focus{border-color:var(--gold2)}
.modal-actions{display:flex;gap:.65rem;margin-top:1.1rem}
.modal-actions button{
  flex:1;padding:.6rem;border-radius:var(--r);border:none;
  font-size:.92rem;cursor:pointer;
  font-family:var(--font-display);
  -webkit-tap-highlight-color:transparent;
}
.btn-save-m{
  background:linear-gradient(135deg,var(--gold),var(--gold2));
  color:#fff;font-weight:400;font-style:italic;
}
.btn-cancel-m{background:var(--ctrl-bg);color:var(--ink)}
.ing-list{margin:.45rem 0;display:flex;flex-direction:column;gap:.38rem}
.ing-row{display:grid;grid-template-columns:1fr .5fr .4fr auto;gap:.28rem;align-items:center}
.ing-row input{min-width:0}
.ing-row .rm{
  background:none;border:1px solid var(--ctrl-border);border-radius:var(--r);
  color:var(--smoke3);padding:.26rem .46rem;cursor:pointer;font-size:.82rem;
  -webkit-tap-highlight-color:transparent;
  transition:background .15s,color .15s;
}
.ing-row .rm:hover{background:rgba(140,74,47,.1);color:var(--terra);border-color:var(--terra-border)}
.btn-add-ing{
  width:100%;background:none;
  border:1.5px dashed var(--ctrl-border);border-radius:var(--r);
  padding:.48rem;color:var(--smoke3);cursor:pointer;
  font-family:var(--font-sans);font-size:.72rem;

/* ═══ Ricette utente (localStorage) ═══ */
var CU = [];
(function(){
  try{var r=window.localStorage&&localStorage.getItem('pan_v1');if(r)CU=JSON.parse(r);}catch(e){CU=[];}
})();
function saveC(){try{if(window.localStorage)localStorage.setItem('pan_v1',JSON.stringify(CU));}catch(e){}}
function all(){return R.concat(CU);}

/* ═══ Stato ═══ */
var dose=1, cat='Tutte', dark=false;

/* ═══ Utility ═══ */
function el(tag,cls){var e=document.createElement(tag);if(cls)e.className=cls;return e;}
function fmtN(v){if(v===null||v===undefined)return '';return(v===Math.floor(v))?String(v):v.toFixed(1);}
function fmtD(v,d){if(v===null||v===undefined)return 'q.b.';var r=v*d;return(r===Math.floor(r))?String(r):r.toFixed(1);}

/* ═══ Build Card ═══ */
function buildCard(r,idx){
  var card=el('div','card');
  card.style.animationDelay=(idx*0.045)+'s';
  card.appendChild(el('div','card-stripe'));

  /* header */
  var hd=el('div','card-hd');
  var meta=el('div','card-meta');
  var num=el('div','card-num');
  num.textContent='N° '+(idx<9?'0':'')+(idx+1);
  meta.appendChild(num);
  if(r.c){var ct=el('div','card-cat');ct.textContent=r.c;meta.appendChild(ct);}
  var nm=el('div','card-name');nm.textContent=r.n;
  if(r._c){var star=el('span','card-name-star');star.textContent=' ★';nm.appendChild(star);}
  hd.appendChild(meta);hd.appendChild(nm);
  card.appendChild(hd);

  /* ingredients table */
  var dL=(dose===Math.floor(dose))?String(dose):dose.toFixed(1);
  var tbl=el('table','tbl');
  var thead=el('thead');var hr=el('tr');
  ['Ingrediente','Base','','× '+dL].forEach(function(h,i){
    var th=el('th');th.textContent=h;
    if(i===1)th.className='r';
    if(i===3)th.className='sc';
    hr.appendChild(th);
  });
  thead.appendChild(hr);tbl.appendChild(thead);

  var tb=el('tbody');
  for(var i=0;i<r.i.length;i++){
    var ing=r.i[i];
    var tr=el('tr');
    if(ing[2]==='§'){
      tr.className='tr-sec';
      var tdSec=el('td');tdSec.setAttribute('colspan','4');tdSec.textContent=ing[0];
      tr.appendChild(tdSec);
    } else {
      var tdN=el('td','td-n');tdN.textContent=ing[0];
      var tdB=el('td','td-b');tdB.textContent=fmtN(ing[1]);
      var tdU=el('td','td-u');tdU.textContent=ing[2];
      var tdS=el('td','td-s');
      tdS.setAttribute('data-b',ing[1]===null?'':ing[1]);
      tdS.setAttribute('data-u',ing[2]);
      tdS.textContent=fmtD(ing[1],dose)+(ing[1]!==null?' '+ing[2]:'');
      tr.appendChild(tdN);tr.appendChild(tdB);tr.appendChild(tdU);tr.appendChild(tdS);
    }
    tb.appendChild(tr);
  }
  tbl.appendChild(tb);
  card.appendChild(tbl);

  /* processo */
  if(r.p&&r.p.length){
    var ps=el('div','proc-sec');
    var pl=el('div','sec-label');pl.textContent='Processo';ps.appendChild(pl);
    var ul=el('ul','proc-list');
    for(var j=0;j<r.p.length;j++){
      var li=el('li','proc-item');
      var pn=el('span','proc-n');pn.textContent=(j+1)+'.';
      li.appendChild(pn);li.appendChild(document.createTextNode(r.p[j]));
      ul.appendChild(li);
    }
    ps.appendChild(ul);card.appendChild(ps);
  }

  /* cottura */
  if(r.k&&r.k.length){
    var cs=el('div','cott-sec');
    var cl=el('div','sec-label');cl.textContent='Cottura';cs.appendChild(cl);
    var cc=el('div','cott-list');
    for(var m=0;m<r.k.length;m++){
      var ch=el('div','cott-chip');
      /* small arrow */
      var arr=document.createElementNS('http://www.w3.org/2000/svg','svg');
      arr.setAttribute('viewBox','0 0 16 16');arr.setAttribute('fill','none');
      arr.setAttribute('class','cott-arrow');
      var poly=document.createElementNS('http://www.w3.org/2000/svg','polyline');
      poly.setAttribute('points','4,4 10,8 4,12');
      poly.setAttribute('stroke','currentColor');poly.setAttribute('stroke-width','1.8');
      poly.setAttribute('stroke-linecap','round');poly.setAttribute('stroke-linejoin','round');
      arr.appendChild(poly);
      ch.appendChild(arr);
      ch.appendChild(document.createTextNode(r.k[m]));
      cc.appendChild(ch);
    }
    cs.appendChild(cc);card.appendChild(cs);
  }

  /* target */
  if(r.q){
    var tg=el('div','target-bar');
    var dot=el('span','target-dot');
    tg.appendChild(dot);tg.appendChild(document.createTextNode(r.q));
    card.appendChild(tg);
  }

  return card;
}

/* ═══ Categories ═══ */
function buildCats(){
  var bar=document.getElementById('catbar');if(!bar)return;
  bar.innerHTML='';
  var a=all(),cats=['Tutte'];
  for(var i=0;i<a.length;i++){if(a[i].c&&cats.indexOf(a[i].c)===-1)cats.push(a[i].c);}
  cats.forEach(function(c){
    var b=el('button','cpill'+(c===cat?' on':''));b.textContent=c;b.type='button';
    b.addEventListener('click',function(){
      cat=c;
      document.querySelectorAll('.cpill').forEach(function(p){p.className='cpill';});
      b.className='cpill on';render();
    });
    bar.appendChild(b);
  });
}

/* ═══ Render ═══ */
function render(){
  var grid=document.getElementById('grid');if(!grid)return;
  grid.innerHTML='';
  var q=((document.getElementById('srch')||{}).value||'').toLowerCase().trim();
  var a=all(),out=[];
  for(var i=0;i<a.length;i++){
    if(a[i].n.toLowerCase().indexOf(q)!==-1&&(cat==='Tutte'||a[i].c===cat))out.push(a[i]);
  }
  var cd=document.getElementById('cnt');
  if(cd)cd.textContent=out.length+' / '+a.length+' ricette';
  if(!out.length){
    var em=el('div','empty');em.style.gridColumn='1/-1';
    var ei=el('div','empty-ico');ei.textContent='⌀';
    var ep=el('p');ep.textContent='Nessuna ricetta trovata';
    em.appendChild(ei);em.appendChild(ep);grid.appendChild(em);return;
  }
  out.forEach(function(r,j){grid.appendChild(buildCard(r,j));});
}

/* ═══ Dose update ═══ */
function updDose(){
  var dl=(dose===Math.floor(dose))?String(dose):dose.toFixed(1);
  document.querySelectorAll('.tbl thead th.sc').forEach(function(th){th.textContent='× '+dl;});
  document.querySelectorAll('.td-s').forEach(function(td){
    var b=td.getAttribute('data-b'),u=td.getAttribute('data-u');
    if(b===''){td.textContent='q.b.';return;}
    td.textContent=fmtD(parseFloat(b),dose)+' '+u;
  });
  var dv=document.getElementById('dval');if(dv)dv.value=dose;
}

/* ═══ Modal helpers ═══ */
function addIng(n,q,u){
  var row=el('div','ing-row');
  var ni=el('input');ni.type='text';ni.placeholder='Ingrediente';ni.value=n||'';ni.autocomplete='off';
  var qi=el('input');qi.type='number';qi.placeholder='Qtà';qi.value=q||'';qi.min='0';qi.step='any';qi.inputMode='decimal';
  var ui=el('input');ui.type='text';ui.placeholder='g / n°';ui.value=u||'';ui.autocomplete='off';
  var rm=el('button','rm');rm.type='button';rm.textContent='×';
  rm.addEventListener('click',function(){var il=document.getElementById('ilist');if(il&&il.children.length>1)il.removeChild(row);});
  row.appendChild(ni);row.appendChild(qi);row.appendChild(ui);row.appendChild(rm);
  document.getElementById('ilist').appendChild(row);
}
function resetModal(){
  var mn=document.getElementById('mn');if(mn)mn.value='';
  var il=document.getElementById('ilist');if(il){il.innerHTML='';addIng();}
}
function openModal(){resetModal();document.getElementById('mbg').classList.add('open');}
function closeModal(){document.getElementById('mbg').classList.remove('open');}

function init(){
  /* search */
  var srch=document.getElementById('srch');if(srch)srch.addEventListener('input',render);

  /* dose */
  var dv=document.getElementById('dval');
  if(dv)dv.addEventListener('change',function(){dose=Math.max(0.5,parseFloat(this.value)||1);updDose();});
  var dp=document.getElementById('dplus');if(dp)dp.addEventListener('click',function(){dose=Math.round((dose+0.5)*10)/10;updDose();});
  var dm=document.getElementById('dminus');if(dm)dm.addEventListener('click',function(){dose=Math.max(0.5,Math.round((dose-0.5)*10)/10);updDose();});

  /* view toggle */
  var vg=document.getElementById('vgrid'),vl=document.getElementById('vlist');
  if(vg)vg.addEventListener('click',function(){document.getElementById('grid').classList.remove('list');vg.className='vbtn on';if(vl)vl.className='vbtn';});
  if(vl)vl.addEventListener('click',function(){document.getElementById('grid').classList.add('list');vl.className='vbtn on';if(vg)vg.className='vbtn';});

  /* theme */
  var tb=document.getElementById('tbtn');
  if(tb)tb.addEventListener('click',function(){
    dark=!dark;
    if(dark)document.documentElement.setAttribute('data-dark','');
    else document.documentElement.removeAttribute('data-dark');
    var ti=document.getElementById('ticon'),tl=document.getElementById('tlbl');
    if(ti)ti.textContent=dark?'☀️':'🌙';
    if(tl)tl.textContent=dark?'Chiaro':'Scuro';
  });

  /* fab + modal */
  var fab=document.getElementById('fab');if(fab)fab.addEventListener('click',openModal);
  var bc=document.getElementById('bcanc');if(bc)bc.addEventListener('click',closeModal);
  var mbg=document.getElementById('mbg');if(mbg)mbg.addEventListener('click',function(e){if(e.target===mbg)closeModal();});
  var badd=document.getElementById('badd');if(badd)badd.addEventListener('click',function(){addIng();});
  var bsave=document.getElementById('bsave');
  if(bsave)bsave.addEventListener('click',function(){
    var name=(document.getElementById('mn').value||'').trim();
    if(!name){alert('Inserisci il nome della ricetta');return;}
    var mc=document.getElementById('mc'),catV=mc?mc.value:'Altro';
    var rows=document.getElementById('ilist').querySelectorAll('.ing-row');
    var ings=[];
    rows.forEach(function(row){
      var ins=row.querySelectorAll('input');
      var iN=(ins[0].value||'').trim(),iQ=ins[1].value?parseFloat(ins[1].value):null,iU=(ins[2].value||'').trim()||'g';
      if(iN)ings.push([iN,iQ,iU]);
    });
    if(!ings.length){alert('Aggiungi almeno un ingrediente');return;}
    CU.push({n:name,c:catV,i:ings,_c:true});
    saveC();closeModal();buildCats();render();
  });

  buildCats();render();
}

/* ═══ Boot (iOS safe) ═══ */
var _booted=false;
function boot(){if(_booted)return;_booted=true;init();}
document.addEventListener('DOMContentLoaded',boot);
window.addEventListener('load',boot);
if(document.readyState==='interactive'||document.readyState==='complete')boot();
setTimeout(boot,0);setTimeout(boot,200);
</script>
</body>
</html>
